-- ============================================================
--  GROQ API CALL
-- ============================================================
local FALLBACKS = {
    "nao entendi muito bem, pode repetir?",
    "hm interessante, mas nao sei responder isso agora",
    "pow, isso foi dificil haha",
    "deixa eu pensar... nao tenho resposta agora",
    "that one stumped me, try asking differently",
}

local function groqChat(messages, modelOverride, callback)
    local key = getApiKey()
    if key == "" then callback("(sem api key configurada)", true) return end

    local model = modelOverride or S.GroqModel
    local ok1, body = pcall(function()
        return HttpService:JSONEncode({
            model       = model,
            temperature = S.Temperature,
            max_tokens  = S.MaxTokens,
            messages    = messages,
        })
    end)
    if not ok1 then callback(FALLBACKS[1], true) return end

    task.spawn(function()
        local res, httpErr = execReq({
            Url    = "https://api.groq.com/openai/v1/chat/completions",
            Method = "POST",
            Headers = {
                ["Content-Type"]  = "application/json",
                ["Authorization"] = "Bearer " .. key,
            },
            Body = body,
        })

        if not res then
            addLog("HTTP error: " .. tostring(httpErr))
            callback(FALLBACKS[math.random(#FALLBACKS)], true)
            return
        end

        local status  = tonumber(res.StatusCode or res.statusCode or 200)
        local rawBody = tostring(res.Body or res.body or "")

        if status == 429 then
            addLog("API rate limited")
            callback("(limite de chamadas, tenta em breve)", true)
            return
        end
        if status == 401 then
            addLog("API key invalida")
            callback("(api key invalida)", true)
            return
        end
        if status < 200 or status >= 300 then
            addLog("API error status: " .. status)
            callback(FALLBACKS[math.random(#FALLBACKS)], true)
            return
        end

        local ok2, data = pcall(function() return HttpService:JSONDecode(rawBody) end)
        if not ok2 or not data or not data.choices then
            addLog("JSON decode fail")
            callback(FALLBACKS[math.random(#FALLBACKS)], true)
            return
        end

        local choice = data.choices[1]
        if not choice then callback(FALLBACKS[math.random(#FALLBACKS)], true) return end

        if choice.finish_reason == "content_filter" then
            callback(FALLBACKS[math.random(#FALLBACKS)], false)
            return
        end

        local content = choice.message and choice.message.content
        if type(content) ~= "string" or content == "" then
            callback(FALLBACKS[math.random(#FALLBACKS)], false)
            return
        end

        -- limpeza da resposta
        content = content:gsub("\r",""):gsub("\n"," "):gsub("%s+"," ")
        content = content:gsub("^%s+",""):gsub("%s+$","")
        content = content:gsub("%*+",""):gsub("`",""):gsub("#","")
        if #content > S.MaxResponseChars then
            content = content:sub(1, S.MaxResponseChars)
        end

        callback(content, false)
    end)
end

