local TabDebug = Window:CreateTab("Debug", 4483362458)
TabDebug:CreateSection("Logs em Tempo Real")

local dbgLabel = TabDebug:CreateLabel("Aguardando eventos...")
dbgLabelRef = dbgLabel

local function refreshDebug()
    local n = #DebugLogs
    local lines = {}
    for i = math.max(1, n-9), n do
        table.insert(lines, DebugLogs[i] or "")
    end
    local info = table.concat(lines, "\n") .. "\n---"
    info = info .. "\nQuiz: " .. tostring(QZ.active)
        .. " R:" .. QZ.round
        .. "/" .. S.MaxRounds
        .. " Wait:" .. tostring(QZ.waiting)
    info = info .. "\nMini: " .. tostring(QZ.miniActive)
        .. " [" .. tostring(QZ.miniType) .. "]"
    info = info .. "\nBot: " .. tostring(S.AutoReply)
    info = info .. "\nPCS: pending=" .. tostring(PCS.pending) .. " choice=" .. tostring(PCS.waitingChoice) .. " custom=" .. tostring(PCS.waitingCustom)
        .. " | Lang: " .. S.MainLanguage
        .. " | Pers: " .. S.PersonalityId
    info = info .. "\nTCS: " .. tostring(useTCS)
        .. " | Listener: " .. tostring(Listener.active)
    dbgLabel:Set(info)
end

TabDebug:CreateButton({ Name="Atualizar Logs", Callback=refreshDebug })

TabDebug:CreateButton({ Name=" Copiar Logs", Callback=function()
    if setclipboard then
        setclipboard(table.concat(DebugLogs, "\n"))
        Rayfield:Notify({Title="OK",Content="Logs copiados!",Duration=2})
    else
        Rayfield:Notify({Title="Erro",Content="setclipboard indisponivel.",Duration=3})
    end
end })

TabDebug:CreateButton({ Name=" Testar Groq API", Callback=function()
    Rayfield:Notify({Title="Testando...",Content="Aguarde...",Duration=2})
    groqChat(
        {
