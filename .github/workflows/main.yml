-- ============================================================
--  SEND CHAT  (metodos com fallback)
-- ============================================================
local lastBotSend = 0

local function sendChatMessage(text)
    if type(text) ~= "string" or text == "" then return end
    text = text:gsub("\r",""):gsub("\n"," "):gsub("%s+"," "):gsub("^%s+",""):gsub("%s+$","")
    if text == "" then return end
    if #text > 200 then text = text:sub(1, 200) end

    -- anti spam: min 0.8s entre mensagens do bot
    local now = os.clock()
    if (now - lastBotSend) < 0.8 then
        task.delay(0.8 - (now - lastBotSend), function()
            sendChatMessage(text)
        end)
        return
    end
    lastBotSend = os.clock()

    local sent = false
    pcall(function()
        local ch = TextChatService
            :FindFirstChild("TextChannels")
            and TextChatService.TextChannels:FindFirstChild("RBXGeneral")
        if ch then ch:SendAsync(text) sent = true end
    end)
    if sent then return end

    pcall(function()
        local rs  = game:GetService("ReplicatedStorage")
        local sys = rs:FindFirstChild("DefaultChatSystemChatEvents")
        local evt = sys and sys:FindFirstChild("SayMessageRequest")
        if evt then evt:FireServer(text, "All") end
    end)
end

-- ============================================================
--  CHAT CLEANER  (remove tags, ranks, emojis de sistema)
-- ============================================================
local function cleanMessage(raw)
    if not raw then return "" end
    local s = raw
    s = s:gsub("%[/?[Cc]olor[^%]]*%]","")  -- color tags
    s = s:gsub("%[%u[%u%s]*%]","")          -- rank tags [VIP] [MOD]
    s = s:gsub(":[%w_]+:","")               -- :emoji_name:
    s = s:gsub("^[%s%p%z%c]+","")
    s = s:gsub("%s+$","")
    s = s:gsub("%s+", " ")
    return s
end

-- ============================================================
--  RATE LIMITER  (individual por jogador)
-- ============================================================
local RateTrack = {}

local function rateAllow(userId)
    if S.CooldownPerUser <= 0 then return true end
    local now  = os.clock()
    local last = RateTrack[userId]
    if last and (now - last) < S.CooldownPerUser then return false end
    RateTrack[userId] = now
    return true
end

-- ============================================================
--  CHAT QUEUE  (fila por usuario â€” nao bloqueia outros)
-- ============================================================
local Queue = {}

local function getQueue(key)
    if not Queue[key] then
        Queue[key] = { head=1, tail=0, items={}, running=false }
    end
    return Queue[key]
end

local function enqueue(key, item)
    local q = getQueue(key)
    if (q.tail - q.head + 1) >= S.MaxQueuePerUser then return false end
    q.tail = q.tail + 1
    q.items[q.tail] = item
    return true
end

local function dequeue(q)
    if q.head > q.tail then return nil end
    local item = q.items[q.head]
    q.items[q.head] = nil
    q.head = q.head + 1
    return item
end

local function processItem(item, onDone)
    if not S.Enabled or not S.AutoReply then onDone() return end

    -- resposta de criador (inline, sem Groq)
    if isAskingCreator(item.cleaned) then
        local creatorMsg = string.format(
            "fui criado por %s, conhecido no Roblox como '%s'! ele usa a mesma skin que o dono do bot",
            CREATOR.username, CREATOR.displayName
        )
        sendChatMessage(creatorMsg)
        addLog("Creator reply to " .. item.name)
        onDone()
        return
    end

    -- detectar idioma
    local lang = S.MainLanguage
    if S.AutoDetectLang and not S.ForceMainLang then
        lang = detectLang(item.cleaned)
    end

    -- montar mensagens para a API
    local history  = getHistory(item.userId)
    local messages = {}
    table.insert(messages, { role="system", content=buildSystemPrompt(lang) })
    for _, m in ipairs(history) do
        table.insert(messages, m)
    end
    local display = item.displayName or item.name or "Player"
    table.insert(messages, {
        role    = "user",
        content = display .. " disse: " .. item.cleaned,
    })

    -- sugestao de troca de personalidade (esporadica)
    S.PersonalityChangeCount = S.PersonalityChangeCount + 1
    local shouldSuggest = S.PersonalityChangeCount >= S.SuggestInterval
        and (os.clock() - S.LastSuggested) > 60

    groqChat(messages, getPersonalityModel(), function(reply, isErr)
        if not isErr and reply ~= "" then
            -- adicionar sugestao de troca ao final ocasionalmente
            if shouldSuggest then
                reply = reply .. " (ps: quer mudar minha personalidade? fala Mudar Personalidade!)"
                S.PersonalityChangeCount = 0
                S.LastSuggested = os.clock()
            end
            addHistory(item.userId, "user",      display .. ": " .. item.cleaned)
            addHistory(item.userId, "assistant", reply)
            sendChatMessage(reply)
            addLog("Reply to " .. item.name .. ": " .. reply:sub(1,60))
        else
            addLog("Groq err for " .. item.name .. ": " .. tostring(reply))
        end
        onDone()
    end)
end

local function runQueue(key)
    local q = getQueue(key)
    if q.running then return end
    q.running = true
    task.spawn(function()
        while true do
            local item = dequeue(q)
            if not item then break end
            local done = false
            processItem(item, function() done = true end)
            local t0 = os.clock()
            while not done do
                if (os.clock() - t0) > 15 then break end
                task.wait(0.05)
            end
        end
        q.running = false
    end)
end

