local ACCENT_MAP = {
    ["Ã¡"]="a",["Ã "]="a",["Ã£"]="a",["Ã¢"]="a",["Ã¤"]="a",
    ["Ã"]="a",["Ã€"]="a",["Ãƒ"]="a",["Ã‚"]="a",["Ã„"]="a",
    ["Ã©"]="e",["Ã¨"]="e",["Ãª"]="e",["Ã«"]="e",
    ["Ã‰"]="e",["Ãˆ"]="e",["ÃŠ"]="e",["Ã‹"]="e",
    ["Ã­"]="i",["Ã¬"]="i",["Ã®"]="i",["Ã¯"]="i",
    ["Ã"]="i",["ÃŒ"]="i",["ÃŽ"]="i",["Ã"]="i",
    ["Ã³"]="o",["Ã²"]="o",["Ãµ"]="o",["Ã´"]="o",["Ã¶"]="o",
    ["Ã“"]="o",["Ã’"]="o",["Ã•"]="o",["Ã”"]="o",["Ã–"]="o",
    ["Ãº"]="u",["Ã¹"]="u",["Ã»"]="u",["Ã¼"]="u",
    ["Ãš"]="u",["Ã™"]="u",["Ã›"]="u",["Ãœ"]="u",
    ["Ã§"]="c",["Ã‡"]="c",["Ã±"]="n",["Ã‘"]="n",
}

local function normStr(s)
    if not s then return "" end
    s = tostring(s):lower()
    s = s:gsub("^%s+",""):gsub("%s+$",""):gsub("%s+"," ")
    s = s:gsub("[%z\194-\244][\128-\191]*", function(c)
        return ACCENT_MAP[c] or c
    end)
    return s
end

local function answerMatches(input, correct, alts)
    local ni = normStr(input)
    local nc = normStr(correct)
    if ni == nc then return true end
    for _, alt in ipairs(alts or {}) do
        if ni == normStr(alt) then return true end
    end
    if #nc >= 4 and ni:find(nc, 1, true) then return true end
    return false
end

