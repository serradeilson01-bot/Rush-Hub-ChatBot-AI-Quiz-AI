-- intercepta mensagem do jogador autorizado durante os estados de espera
-- retorna true se a mensagem foi consumida pelo PCS
local function handlePersonalityChangeChat(sender, cleaned)
    -- so processa mensagens do jogador que pediu a troca
    if sender.UserId ~= PCS.targetUserId then return false end

    -- estado: aguardando escolha de personalidade
    if PCS.waitingChoice then
        local key = detectPersonalityFromMsg(cleaned)
        if not key then
            sendChatMessage("nao reconheci essa personalidade. opcoes: Friendly, Smart, Funny, Chill, Mysterious, Serious, Tutor, Gamer, Monday, Custom")
            return true
        end

        if PCS.timeout then pcall(task.cancel, PCS.timeout) PCS.timeout = nil end
        PCS.waitingChoice = false

        if key == "Custom" then
            -- entra em modo de aguardar descricao custom
            PCS.waitingCustom = true
            sendChatMessage("ok! agora me descreve como voce quer que eu seja (pode ser em portugues mesmo, tipo 'fala com girias e e bem animado')")
            addLog("PCS: aguardando descricao Custom de " .. PCS.targetName)
            -- timeout 45s para descrever
            PCS.timeout = task.delay(45, function()
                if PCS.waitingCustom then
                    cancelPCS("tempo esgotado, personalidade Custom cancelada.")
                end
            end)
        else
            local name = PCS.targetName
            cancelPCS(nil)  -- limpa estado antes de aplicar
            applyPersonality(key, nil, name)
        end
        return true
    end

    -- estado: aguardando descricao da personalidade Custom
    if PCS.waitingCustom then
        if PCS.timeout then pcall(task.cancel, PCS.timeout) PCS.timeout = nil end
        local desc    = cleaned
        local reqName = PCS.targetName
        cancelPCS(nil)  -- limpa estado
        applyPersonality("Custom", desc, reqName)
        return true
    end

    return false
end

-- ============================================================
--  MAIN CHAT PROCESSOR
-- ============================================================
local useTCS = false
pcall(function()
    if TextChatService.ChatVersion == Enum.ChatVersion.TextChatService
       or TextChatService:FindFirstChild("TextChannels") then
        useTCS = true
    end
end)

local function processChatMessage(sender, rawMsg)
    if sender.UserId == LP.UserId then return end
    if isBlacklisted(sender.UserId) then return end
    if type(rawMsg) ~= "string" then return end

    local msg = rawMsg:gsub("\r",""):gsub("\n"," "):gsub("%s+"," "):gsub("^%s+",""):gsub("%s+$","")
    if msg == "" then return end

    local cleaned = cleanMessage(msg)
    addLog("CHAT [" .. sender.Name .. "]: " .. cleaned)

    -- PCS intercepta primeiro (respostas de troca de personalidade)
    if handlePersonalityChangeChat(sender, cleaned) then return end

    -- Follow commands
    if S.FollowingEnabled then
        local low = cleaned:lower()
        local stopKW   = {"stop following","dont follow","unfollow","para de seguir","nao me segue"}
        local followKW = {"follow me","siga me","me segue","me siga","follow"}
        for _, kw in ipairs(stopKW) do
            if low:find(kw, 1, true) then stopFollow() return end
        end
        for _, kw in ipairs(followKW) do
            if low:find(kw, 1, true) then startFollow(sender) return end
        end
    end

    -- Quiz e MiniGame sem cooldown
    if QZ.active and QZ.waiting and not QZ.miniActive then
        handleQuizAnswer(sender.Name, cleaned)
        return
    end
    if QZ.miniActive and QZ.waiting then
        handleMiniAnswer(sender.Name, cleaned)
        return
    end

    -- Chatbot
    if not S.Enabled or not S.AutoReply then return end
    if not passesTrigger(cleaned) then return end
    if not rateAllow(sender.UserId) then
        addLog("Cooldown [" .. sender.Name .. "]")
        return
    end

    -- Range check (so bloqueia se ambos characters carregados)
    if S.RangeEnabled then
        local myC = LP.Character
        local thC = sender.Character
        if myC and thC then
            local myR = myC:FindFirstChild("HumanoidRootPart")
            local thR = thC:FindFirstChild("HumanoidRootPart")
            if myR and thR then
                local dist = (myR.Position - thR.Position).Magnitude
                if dist > S.RangeStuds then
                    addLog("Range [" .. sender.Name .. "] fora (" .. math.floor(dist) .. " studs)")
                    return
                end
            end
        end
    end

    local stripped = stripTrigger(cleaned)
    if stripped == "" then return end

    -- detectar pedido de troca de personalidade (trigger pelo chat)
    if isAskingPersonalityChange(stripped) then
        showPersonalityChangeUI(sender.UserId, sender.DisplayName or sender.Name)
        return
    end

    PlayerConvTime[sender.UserId] = os.clock()

    local qKey = S.PerUserMemory and sender.UserId or "Global"
    local ok = enqueue(qKey, {
        userId      = sender.UserId,
        displayName = sender.DisplayName,
        name        = sender.Name,
        cleaned     = stripped,
    })
    if ok then
        runQueue(qKey)
    else
        addLog("Fila cheia [" .. sender.Name .. "]")
    end
end

-- ============================================================
--  LISTENER  (unico, sem duplicacao)
-- ============================================================
local Listener = { active=false, conns={}, perPlayer={} }

local function startListening()
    if Listener.active then return end
    Listener.active = true

    if useTCS then
        local c = TextChatService.MessageReceived:Connect(function(m)
            local src = m and m.TextSource
            if not src then return end
            local p = Players:GetPlayerByUserId(src.UserId)
            if p then processChatMessage(p, m.Text or "") end
        end)
        table.insert(Listener.conns, c)
        addLog("Listener: TCS ativo")
        return
    end

    local function bind(p)
        if Listener.perPlayer[p] then
            pcall(function() Listener.perPlayer[p]:Disconnect() end)
        end
        Listener.perPlayer[p] = p.Chatted:Connect(function(msg)
            processChatMessage(p, msg)
        end)
    end

    for _, p in ipairs(Players:GetPlayers()) do bind(p) end
    table.insert(Listener.conns, Players.PlayerAdded:Connect(bind))
    table.insert(Listener.conns, Players.PlayerRemoving:Connect(function(p)
        if Listener.perPlayer[p] then
            pcall(function() Listener.perPlayer[p]:Disconnect() end)
            Listener.perPlayer[p] = nil
        end
    end))
    addLog("Listener: Chatted ativo")
end

