--  TAB: MODERATION
-- ============================================================
local TabMod = Window:CreateTab("Moderation", 4483362458)
TabMod:CreateSection("Bloquear Jogadores")

local modTarget = nil

local function buildPlayerOpts()
    local opts = {}
    for _, p in ipairs(Players:GetPlayers()) do
        if p.UserId ~= LP.UserId then
            table.insert(opts, p.DisplayName .. " (@" .. p.Name .. ")")
        end
    end
    if #opts == 0 then table.insert(opts, "Nenhum jogador") end
    return opts
end

TabMod:CreateDropdown({
    Name="Selecionar Jogador", Options=buildPlayerOpts(),
    CurrentOption={"Selecione..."}, Flag="ModTarget",
    Callback=function(v)
        local val = v[1] or v
        for _, p in ipairs(Players:GetPlayers()) do
            if p.UserId ~= LP.UserId then
                if (p.DisplayName .. " (@" .. p.Name .. ")") == val then
                    modTarget = p
                    local bl = isBlacklisted(p.UserId) and "BLOQUEADO" or "Normal"
                    Rayfield:Notify({Title=p.DisplayName, Content="Status: "..bl, Duration=3})
                    break
                end
            end
        end
    end,
})

TabMod:CreateButton({ Name=" Bloquear", Callback=function()
    if not modTarget then Rayfield:Notify({Title="Erro",Content="Selecione um jogador.",Duration=3}) return end
    table.insert(S.BlacklistIds, modTarget.UserId)
    Rayfield:Notify({Title="Bloqueado",Content=modTarget.DisplayName,Duration=3})
end })

TabMod:CreateButton({ Name="Desbloquear", Callback=function()
    if not modTarget then Rayfield:Notify({Title="Erro",Content="Selecione um jogador.",Duration=3}) return end
    for i, id in ipairs(S.BlacklistIds) do
        if id == modTarget.UserId then table.remove(S.BlacklistIds, i) break end
    end
    Rayfield:Notify({Title="Desbloqueado",Content=modTarget.DisplayName,Duration=3})
end })

TabMod:CreateSection("Timeout Temporario")

local timeoutMins = 5
TabMod:CreateSlider({ Name="Duracao (min)", Range={1,120}, Increment=1, Suffix=" min",
    CurrentValue=timeoutMins, Flag="TimeoutMins",
    Callback=function(v) timeoutMins=v end })

TabMod:CreateButton({ Name="â± Aplicar Timeout", Callback=function()
    if not modTarget then Rayfield:Notify({Title="Erro",Content="Selecione um jogador.",Duration=3}) return end
    S.BlacklistTemp[modTarget.UserId] = os.time() + (timeoutMins * 60)
    Rayfield:Notify({Title="Timeout",Content=modTarget.DisplayName.." por "..timeoutMins.." min.",Duration=4})
end })

TabMod:CreateButton({ Name=" Remover Timeout", Callback=function()
    if not modTarget then return end
    S.BlacklistTemp[modTarget.UserId] = nil
    Rayfield:Notify({Title="Removido",Content=modTarget.DisplayName,Duration=3})
end })

TabMod:CreateButton({ Name=" Limpar Todos os Bloqueios", Callback=function()
    S.BlacklistIds={} S.BlacklistTemp={}
    Rayfield:Notify({Title="OK",Content="Todos os bloqueios removidos.",Duration=3})
end })

