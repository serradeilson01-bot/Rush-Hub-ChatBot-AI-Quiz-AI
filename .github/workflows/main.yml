-- ============================================================
--  EXECUTOR HTTP  (Synapse - Fluxus - Delta - Wave - etc)
-- ============================================================
local function execReq(opts)
    local fn = (syn and syn.request)
             or (http and http.request)
             or http_request
             or (fluxus and fluxus.request)
             or request
    if not fn then return nil, "NoHTTPFunction" end
    local ok, res = pcall(fn, opts)
    if not ok then return nil, tostring(res) end
    return res, nil
end

