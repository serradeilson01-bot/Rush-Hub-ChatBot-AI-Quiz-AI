local vizPart = nil

local function updateVisualizer()
    local show = S.RangeEnabled and S.ShowVisualizer
    if not show then
        if vizPart then vizPart:Destroy() vizPart=nil end
        return
    end
    local root = LP.Character and LP.Character:FindFirstChild("HumanoidRootPart")
    if not root then return end
    if not vizPart or not vizPart.Parent then
        vizPart = Instance.new("Part")
        vizPart.Name         = "AIQuizRangeViz"
        vizPart.Shape        = Enum.PartType.Cylinder
        vizPart.Anchored     = false
        vizPart.CanCollide   = false
        vizPart.CanTouch     = false
        vizPart.CanQuery     = false
        vizPart.CastShadow   = false
        vizPart.Massless     = true
        vizPart.Material     = Enum.Material.Neon
        vizPart.Color        = Color3.fromRGB(0, 200, 255)
        vizPart.Transparency = 0.85
        vizPart.Parent       = workspace
        local w = Instance.new("Weld")
        w.Part0  = root
        w.Part1  = vizPart
        w.C0     = CFrame.Angles(0,0,math.rad(90))
        w.Parent = vizPart
    end
    local d = S.RangeStuds * 2
    vizPart.Size = Vector3.new(0.3, d, d)
end

