-- ============================================================
--  PERSONALITY CHANGE SYSTEM
--  Fluxo:
--  1. Jogador fala "mudar personalidade"
--  2. Bot fala no chat + abre UI de permissao
--  3. Dono clica Sim -> bot fica escutando o chat do jogador
--  4. Jogador fala o nome da personalidade -> bot muda e confirma
--  5. Se for Custom -> bot pede descricao pelo chat e aplica
-- ============================================================

-- estado do sistema de troca
local PCS = {
    pending        = false,  -- aguardando clique na UI
    waitingChoice  = false,  -- aguardando jogador falar a personalidade
    waitingCustom  = false,  -- aguardando jogador descrever a custom
    targetUserId   = nil,    -- userId de quem pediu a troca
    targetName     = nil,    -- nome display de quem pediu
    timeout        = nil,    -- task de timeout
}

-- mapa de palavras aceitas no chat -> chave de personalidade
local PERS_CHAT_MAP = {
    friendly    = "Friendly",
    amigavel    = "Friendly",
    amigo       = "Friendly",
    smart       = "Smart",
    inteligente = "Smart",
    sabio       = "Smart",
    funny       = "Funny",
    engracado   = "Funny",
    comico      = "Funny",
    chill       = "Chill",
    tranquilo   = "Chill",
    relaxado    = "Chill",
    mysterious  = "Mysterious",
    misterioso  = "Mysterious",
    serious     = "Serious",
    serio       = "Serious",
    formal      = "Serious",
    tutor       = "Tutor",
    professor   = "Tutor",
    gamer       = "Gamer",
    jogador     = "Gamer",
    monday      = "Monday",
    sarcastico  = "Monday",
    sarcastic   = "Monday",
    custom      = "Custom",
    customizado = "Custom",
    personalizado = "Custom",
}

local function cancelPCS(reason)
    PCS.pending       = false
    PCS.waitingChoice = false
    PCS.waitingCustom = false
    PCS.targetUserId  = nil
    PCS.targetName    = nil
    if PCS.timeout then pcall(task.cancel, PCS.timeout) PCS.timeout = nil end
    if reason then sendChatMessage(reason) end
    addLog("PCS cancelado: " .. tostring(reason))
end

-- aplica personalidade pelo nome da chave
local function applyPersonality(key, customDesc, requesterName)
    if not Personalities[key] then return false end
    S.PersonalityId = key
    if key == "Custom" and customDesc and customDesc ~= "" then
        S.CustomSystemPrompt = customDesc
        Personalities.Custom.system = customDesc
        sendChatMessage("personalidade Custom aplicada! vou ser: " .. customDesc:sub(1, 80))
        addLog("Personality -> Custom: " .. customDesc:sub(1,60))
    else
        S.CustomSystemPrompt = ""
        sendChatMessage("personalidade mudada para " .. key .. "! valeu " .. (requesterName or "") .. " :)")
        addLog("Personality -> " .. key)
    end
    -- notifica no Rayfield tambem
    Rayfield:Notify({
        Title   = "Personalidade Mudada",
        Content = "Nova personalidade: " .. key,
        Duration = 4,
    })
    return true
end

-- tenta reconhecer personalidade de uma mensagem de chat
local function detectPersonalityFromMsg(msg)
    local low = msg:lower():gsub("^%s+",""):gsub("%s+$","")
    -- match direto
    for word, key in pairs(PERS_CHAT_MAP) do
        if low == word or low:find("^" .. word .. "$") or low:find(word, 1, true) then
            return key
        end
    end
    return nil
end

