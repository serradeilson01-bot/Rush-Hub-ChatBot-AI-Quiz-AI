        "ciao","si","grazie","come","con","per","ma","bene","molto",
        "questo","quello","sono","hai","va","dai","bello",
    },
}

local function detectLang(msg)
    if not msg or msg == "" then return S.MainLanguage end
    local lower = msg:lower()
    local best, bestN = S.MainLanguage, 0
    for lang, words in pairs(LANG_KEYS) do
        local n = 0
        for _, w in ipairs(words) do
            -- word boundary check para evitar falso positivo
            if lower:find("%f[%a]" .. w .. "%f[%A]") or lower == w then
                n = n + 1
            end
        end
        if n > bestN then best, bestN = lang, n end
    end
    return best
end

