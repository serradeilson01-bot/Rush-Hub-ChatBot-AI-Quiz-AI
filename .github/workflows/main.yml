local TabLB = Window:CreateTab("Leaderboard", 4483362458)
TabLB:CreateSection("Placar em Tempo Real")

local lbLabel = TabLB:CreateLabel("Nenhum quiz ativo ainda.")

local function refreshLB()
    local sorted = {}
    for name, pts in pairs(QZ.scores) do
        table.insert(sorted, {name=name, pts=pts})
    end
    table.sort(sorted, function(a,b) return a.pts > b.pts end)
    if #sorted == 0 then lbLabel:Set("Nenhuma pontuacao ainda.") return end
    local lines = {}
    local medals = {"","",""}
    for i, v in ipairs(sorted) do
        local m = medals[i] or (i .. ".")
        table.insert(lines, m .. " " .. v.name .. " â€” " .. v.pts .. " pts")
        if i >= 10 then break end
    end
    lbLabel:Set(table.concat(lines, "\n"))
end

TabLB:CreateButton({ Name="Atualizar",          Callback=refreshLB })
TabLB:CreateButton({ Name=" Resetar Placar",      Callback=function() QZ.scores={} lbLabel:Set("Placar resetado.") end })
TabLB:CreateButton({ Name=" Anunciar no Chat",    Callback=announceScores })

