--  INIT
-- ============================================================
local function Init()
    math.randomseed(os.clock() * 100000)

    -- listener sempre ativo (quiz funciona sem AutoReply)
    startListening()
    updateVisualizer()

    addLog("AIQuizHub v4.0 iniciado por " .. CREATOR.username .. " (Brown)")

    task.delay(2, function()
        Rayfield:Notify({
            Title   = "AI Quiz Hub v4.0",
            Content = "Pronto! By " .. CREATOR.username .. " (Brown). Ligue Auto Reply para o chatbot.",
            Duration = 7,
        })
    end)
end

Init()
