local ALL_CATS = {
    "Matematica","Historia","Geografia","Ciencias","Literatura","Arte","Cultura",
    "Futebol","Anime","Roblox","Tecnologia","Programacao",
    "Math","History","Geography","Science","Arts","Sports","Programming","Literature",
}
for _, cat in ipairs(ALL_CATS) do
    TabCats:CreateToggle({
        Name=cat, CurrentValue=true, Flag="Cat_"..cat,
        Callback=function(v)
            if v then
                local f=false
                for _, c in ipairs(S.SelectedCats) do if c==cat then f=true break end end
                if not f then table.insert(S.SelectedCats, cat) end
            else
                for i, c in ipairs(S.SelectedCats) do
                    if c==cat then table.remove(S.SelectedCats, i) break end
                end
            end
        end,
    })
end

