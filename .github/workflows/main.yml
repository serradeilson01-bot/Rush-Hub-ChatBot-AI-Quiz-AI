    round      = 0,
    scores     = {},
    usedIdx    = {},
    waiting    = false,
    answer     = nil,
    altAns     = {},
    category   = nil,
    question   = nil,
    timer      = nil,
    miniActive = false,
    miniType   = nil,
    miniAnswer = nil,
    miniTimer  = nil,
}

-- ============================================================
--  QUIZ SCORE HELPERS
-- ============================================================
local function announceScores()
    local sorted = {}
    for name, pts in pairs(QZ.scores) do
        table.insert(sorted, {name=name, pts=pts})
    end
    table.sort(sorted, function(a,b) return a.pts > b.pts end)
    if #sorted == 0 then return end
    local parts = {QT("scores")}
    for i, v in ipairs(sorted) do
        table.insert(parts, i .. ". " .. v.name .. " " .. v.pts .. " " .. QT("points"))
        if i >= 5 then break end
    end
    sendChatMessage(table.concat(parts, " | "))
end

local function getWinner()
    local best, bestPts = nil, -1
    for name, pts in pairs(QZ.scores) do
        if pts > bestPts then best, bestPts = name, pts end
    end
    return best, bestPts
end

-- ============================================================
--  QUIZ ENGINE
-- ============================================================
local function pickQuestion()
    local used = {}
    for _, v in ipairs(QZ.usedIdx) do used[v] = true end
    local pool = {}
    for i, q in ipairs(QB) do
        if not used[i] then
            local langOk = S.MultiLangQuiz or (q.lang == S.QuizLanguage)
            local catOk  = S.RandomCategories or (#S.SelectedCats == 0)
            if not catOk then
                for _, c in ipairs(S.SelectedCats) do
                    if c == q.cat then catOk=true break end
                end
            end
            if langOk and catOk then
                table.insert(pool, {idx=i, data=q})
            end
        end
    end
    if #pool == 0 then
        if #QZ.usedIdx == 0 then
            return {q="Qual e a capital do Brasil?",a="brasilia",alt={},cat="Geografia",lang="Portugues"}
        end
        QZ.usedIdx = {}
        return pickQuestion()
    end
    local pick = pool[math.random(#pool)]
    table.insert(QZ.usedIdx, pick.idx)
    return pick.data
end

local startQuizRound

local function stopQuiz(silent)
    QZ.active  = false
    QZ.waiting = false
    if QZ.timer then pcall(task.cancel, QZ.timer) QZ.timer=nil end
    if not silent then
        local w, wp = getWinner()
        sendChatMessage(QT("quiz_end") .. (w or QT("no_winner")) .. " (" .. tostring(wp or 0) .. " " .. QT("points") .. ")")
        task.delay(1, announceScores)
    end
    addLog("Quiz parado.")
end

startQuizRound = function()
    if not QZ.active then return end
    QZ.round = QZ.round + 1
    if QZ.round > S.MaxRounds then stopQuiz(false) return end

    local qData    = pickQuestion()
    QZ.question    = qData.q
    QZ.answer      = qData.a
    QZ.altAns      = qData.alt or {}
    QZ.category    = qData.cat
    QZ.waiting     = true

    local header = QT("round") .. " " .. QZ.round .. "/" .. S.MaxRounds
    if S.AnnounceCategory then
        header = header .. " [" .. (QZ.category or "?") .. "]"
    end
    sendChatMessage(header .. " | " .. QT("question") .. ": " .. QZ.question)
    addLog("Q" .. QZ.round .. ": " .. QZ.question .. " | A: " .. QZ.answer)

    QZ.timer = task.delay(S.AnswerTime, function()
        if not QZ.waiting then return end
        QZ.waiting = false
        if S.ShowCorrectAnswer then
            sendChatMessage(QT("time_up") .. " " .. QT("wrong") .. QZ.answer)
        else
            sendChatMessage(QT("time_up"))
        end
        task.delay(S.QuestionDelay, function()
            if QZ.active then startQuizRound() end
        end)
    end)
end

local function startQuiz()
    if QZ.active then
        Rayfield:Notify({Title="Quiz", Content="Quiz ja esta ativo!", Duration=3})
        return
    end
    QZ.active  = true
    QZ.round   = 0
    QZ.scores  = {}
    QZ.usedIdx = {}
    QZ.waiting = false
    local cat = S.RandomCategories and "Aleatorio" or "Selecionadas"
    sendChatMessage(QT("quiz_start") .. cat)
    task.delay(2, startQuizRound)
    addLog("Quiz iniciado.")
end

local function handleQuizAnswer(speaker, msg)
    if not QZ.active or not QZ.waiting then return end
    if not answerMatches(cleanMessage(msg), QZ.answer, QZ.altAns) then return end
    QZ.waiting = false
    if QZ.timer then pcall(task.cancel, QZ.timer) QZ.timer=nil end
    QZ.scores[speaker] = (QZ.scores[speaker] or 0) + S.PointsPerCorrect
    local total = QZ.scores[speaker]
    sendChatMessage(speaker .. " " .. QT("correct") .. " +" .. S.PointsPerCorrect .. " " .. QT("points") .. " | Total: " .. total)
    if S.AnnounceScore then task.delay(0.6, announceScores) end
    if total >= S.PointsToWin then
        QZ.active = false
        task.delay(0.9, function()
            sendChatMessage(QT("quiz_end") .. speaker .. " (" .. total .. " " .. QT("points") .. ")")
        end)
        addLog("Vencedor: " .. speaker)
        return
    end
    task.delay(S.QuestionDelay, function()
        if QZ.active then startQuizRound() end
    end)
end

-- ============================================================
--  MINI GAMES
-- ============================================================
local function miniEnd(winner)
    QZ.miniActive = false
    QZ.waiting    = false
    if QZ.miniTimer then pcall(task.cancel, QZ.miniTimer) QZ.miniTimer=nil end
    if winner then
        QZ.scores[winner] = (QZ.scores[winner] or 0) + S.PointsPerCorrect
        sendChatMessage(winner .. " acertou! +" .. S.PointsPerCorrect .. " pts!")
    end
end

local function handleMiniAnswer(speaker, msg)
    if not QZ.miniActive or not QZ.waiting then return end
    if answerMatches(cleanMessage(msg), QZ.miniAnswer, {}) then
        miniEnd(speaker)
    end
end

