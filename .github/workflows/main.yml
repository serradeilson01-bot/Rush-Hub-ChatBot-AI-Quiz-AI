local PlayerConvTime = {}

local function passesTrigger(msg)
    if S.TriggerMode == "all" then return true end
    if S.TriggerMode == "prefix" then
        return msg:sub(1, #S.TriggerPrefix) == S.TriggerPrefix
    end
    if S.TriggerMode == "mention" then
        return msg:lower():find(S.BotName:lower(), 1, true) ~= nil
    end
    return true
end

local function stripTrigger(msg)
    if S.TriggerMode == "prefix" then
        local p = S.TriggerPrefix
        if msg:sub(1, #p) == p then
            return msg:sub(#p + 1):gsub("^%s+","")
        end
    end
    return msg
end

-- ============================================================
--  FOLLOW SYSTEM  (Pathfinding + Linear + anti-stuck)
-- ============================================================
local Follow = { target=nil, active=false, lastUpdate=0 }
local fWaypoints, fWPIdx, fLastPos, fStuck = {}, 1, nil, 0

local function stopFollow()
    if Follow.target then
        Rayfield:Notify({ Title="Follow", Content="Parando de seguir "..Follow.target.DisplayName, Duration=3 })
    end
    Follow.target  = nil
    Follow.active  = false
    fWaypoints     = {}
end

local function startFollow(p)
    Follow.target = p
    Follow.active = true
    Rayfield:Notify({ Title="Follow", Content="Seguindo "..p.DisplayName, Duration=3 })
end

RunService.Heartbeat:Connect(function(dt)
    if not Follow.active or not Follow.target or not S.FollowingEnabled then return end
    local myC = LP.Character
    local thC = Follow.target.Character
    if not myC or not thC then return end
    local hum    = myC:FindFirstChildOfClass("Humanoid")
    local myRoot = myC:FindFirstChild("HumanoidRootPart")
    local thRoot = thC:FindFirstChild("HumanoidRootPart")
    if not hum or hum.Health <= 0 or not myRoot or not thRoot then return end
    local dist = (myRoot.Position - thRoot.Position).Magnitude
    if dist <= 5 then fWaypoints={} fLastPos=nil fStuck=0 return end
    if fLastPos then
        local mv = (myRoot.Position - fLastPos).Magnitude
        if mv < 0.3 then
            fStuck = fStuck + dt
            if fStuck > 0.7 then hum.Jump=true fStuck=0 end
        else fStuck=0 end
    end
    fLastPos = myRoot.Position
    if S.FollowMode == "Linear" then hum:MoveTo(thRoot.Position) return end
    local now = os.clock()
    if (now - Follow.lastUpdate) > 0.9 or #fWaypoints == 0 then
        Follow.lastUpdate = now
        task.spawn(function()
            local path = PathfindingService:CreatePath({AgentRadius=2,AgentHeight=5,AgentCanJump=true})
            local ok = pcall(function() path:ComputeAsync(myRoot.Position, thRoot.Position) end)
            if ok and path.Status == Enum.PathStatus.Success then
                fWaypoints = path:GetWaypoints() fWPIdx = 2
            else hum:MoveTo(thRoot.Position) fWaypoints={} end
        end)
    end
    if #fWaypoints > 0 and fWPIdx <= #fWaypoints then
        local wp = fWaypoints[fWPIdx]
        hum:MoveTo(wp.Position)
        if wp.Action == Enum.PathWaypointAction.Jump then hum.Jump=true end
        if (myRoot.Position - wp.Position).Magnitude < 3.5 then fWPIdx=fWPIdx+1 end
    else hum:MoveTo(thRoot.Position) end
end)

